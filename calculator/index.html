<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Animated Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toggle-container">
    <button id="themeToggle">🌙</button>
</div>

<div class="calculator">
    <div class="display-container">
        <input type="text" id="display" disabled>
        <div id="preview"></div>
    </div>

    <div class="buttons">
        <!-- Scientific -->
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>
        <button onclick="append('Math.log10(')">log</button>

        <!-- Clear Row -->
        <button onclick="clearDisplay()" class="operator">C</button>
        <button onclick="deleteLast()" class="operator">⌫</button>
        <button onclick="append('%')" class="operator">%</button>
        <button onclick="append('/')" class="operator">÷</button>

        <!-- Numbers -->
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')" class="operator">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')" class="operator">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')" class="operator">+</button>

        <button onclick="append('0')" class="zero">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<div class="history">
    <h3>History</h3>
    <ul id="historyList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
